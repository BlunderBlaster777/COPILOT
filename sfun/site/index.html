<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prediction Market Test UI</title>

  <!-- Load ethers.js FIRST -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>


  <!-- Load your app.js AFTER ethers -->
  <script src="app.js" defer></script>
</head>
<body>
  <h2>Prediction Market Test UI</h2>

  <button id="connect" disabled>Connect Wallet</button>

  <p id="account"></p>

  <p id="timeLeft"></p>

  <hr>

  <h3>Oracle</h3>
  <button id="readPrice">Read Price</button>
  <input id="newPrice" placeholder="New price (1e18)" />
  <button id="setPrice">Set Price</button>
  <p id="oracleOutput"></p>

  <hr>

  <h3>Market</h3>
  <button id="createMarket">Create Market</button>
  <input id="resolveId" placeholder="Market ID" />
  <button id="resolveMarket">Resolve Market</button>

  <hr>

  <h3>Betting</h3>
  <input id="betId" placeholder="Market ID" />
  <input id="betAmount" placeholder="Amount (USDC units)" />
  <h3>USDC Approval</h3>
<button id="approveUSDC">Approve USDC</button>
<p id="approveStatus"></p>


  <button id="betUp">Bet Up</button>
  <button id="betDown">Bet Down</button>

  <hr>

  <h3>Claim</h3>
  <input id="claimId" placeholder="Market ID" />
  <button id="claim">Claim</button>

</body>
</html>
